services:
  - name: earnsafe-backend
    type: web
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: earnsafe-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: earnsafe-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # ── SMS / OTP Gateway (MSG91) ──────────────────────────────────────
      # Set these in the Render dashboard to enable real SMS delivery.
      # Leave unset to use debug_otp mode (OTP returned in API response).
      - key: MSG91_API_KEY
        sync: false
      - key: MSG91_TEMPLATE_ID
        sync: false
      - key: MSG91_SENDER_ID
        value: EARNSAFE
  - name: earnsafe-redis
    type: keyvalue
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction
  - name: earnsafe-web
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npx expo export --platform web --clear
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_BASE_URL
        value: https://earnsafe-backend.onrender.com
      - key: EXPO_PUBLIC_TOMTOM_API_KEY
        sync: false

databases:
  - name: earnsafe-db
    plan: free
    databaseName: earnsafe
    user: earnsafe
