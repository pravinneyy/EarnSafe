<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>EarnSafe Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Login Overlay -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-80 text-center">
            <h2 class="text-2xl font-black mb-6">Admin Access</h2>
            <input type="text" id="phone" placeholder="Phone Number" class="w-full border p-4 rounded-xl mb-4 text-center">
            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">ENTER</button>
        </div>
    </div>

    <main class="container mx-auto p-10">
        <div class="bg-white p-10 rounded-3xl shadow-xl max-w-2xl mx-auto">
            <h1 class="text-3xl font-black mb-10 text-center text-blue-900">SYSTEM BROADCASTER</h1>
            
            <div class="space-y-8">
                <div>
                    <label class="flex justify-between font-bold mb-2">Rainfall <span id="val-rain">0mm</span></label>
                    <input type="range" id="rain" min="0" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="flex justify-between font-bold mb-2">Temperature <span id="val-temp">25°C</span></label>
                    <input type="range" id="temp" min="10" max="55" value="25" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="flex justify-between font-bold mb-2">Traffic Congestion <span id="val-traffic">0%</span></label>
                    <input type="range" id="traffic" min="0" max="100" value="0" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>
                <div>
                    <label class="flex justify-between font-bold mb-2">AQI Level <span id="val-aqi">1</span></label>
                    <input type="range" id="aqi" min="1" max="5" value="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="pt-10 space-y-4">
                    <button onclick="sendSim(true)" class="w-full bg-red-600 text-white p-6 rounded-2xl font-black text-lg shadow-lg hover:scale-105 transition-transform uppercase tracking-widest">
                        Run Global Simulation
                    </button>
                    <button onclick="sendSim(false)" class="w-full bg-slate-800 text-white p-4 rounded-2xl font-bold">
                        Stop Simulation (Back to Real APIs)
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://earnsafe-backend.onrender.com";

        // UI Sliders
        ['rain', 'temp', 'traffic', 'aqi'].forEach(id => {
            const el = document.getElementById(id);
            el.oninput = () => {
                const units = {rain:'mm', temp:'°C', traffic:'%', aqi:''};
                document.getElementById('val-'+id).innerText = el.value + units[id];
            };
        });

        async function login() {
            const phone = document.getElementById('phone').value;
            const res = await fetch(`${API_URL}/admin/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phone})
            });
            if(res.ok) document.getElementById('login-screen').remove();
            else alert("Invalid Phone");
        }

       // --- Update only the sendSim function in index.html ---

async function sendSim(active) {
    const endpoint = active ? '/admin/start-simulation' : '/admin/stop-simulation';
    
    // Collect all slider values
    const payload = {
        temp: document.getElementById('temp').value,
        rain: document.getElementById('rain').value,
        aqi: document.getElementById('aqi').value,
        traffic: document.getElementById('traffic').value
    };

    try {
        const res = await fetch(API_URL + endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        const data = await res.json();
        if(res.ok) {
            alert(active ? "🚀 SIMULATION LIVE! All users will now see disrupted data." : "🛑 Simulation Stopped. Returning to Real APIs.");
        }
    } catch (err) {
        alert("Error connecting to backend: " + err);
    }
}
    </script>
</body>
</html>
